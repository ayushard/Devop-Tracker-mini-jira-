spring.application.name=devops-dashboard
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/devops_dashboard?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.jwt.secret=change-this-secret-key-for-production-change-this-secret-key
app.jwt.expiration=86400000
app.cors.allowed-origins=http://localhost:5173

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
